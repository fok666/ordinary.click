<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>my.ordinary.click — a personal image collection</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="icon" href="data:," />
</head>
<body>
  <div class="site-banner">
    <div class="site-banner-inner">
      <div>
        <h1><a href="/">my.ordinary.click</a></h1>
        <p class="tagline">My personal collection of unremarkable, ordinary moments.</p>
      </div>
      <nav class="site-nav">
        <a href="#/">Gallery</a>
        <a href="#/map">Map</a>
      </nav>
      <nav id="auth-nav" class="auth-nav"></nav>
    </div>
  </div>

  <main id="app">
    <section id="intro">
      <p>Loading categories…</p>
    </section>
  </main>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" aria-label="Close">×</button>
    <button class="lightbox-prev" aria-label="Previous">‹</button>
    <img alt="" />
    <button class="lightbox-next" aria-label="Next">›</button>
    <div class="lightbox-meta" id="lightbox-meta"></div>
  </div>

  <div id="meta-modal" class="meta-modal" hidden>
    <div class="meta-modal-content">
      <h3>Edit image metadata</h3>
      <form id="meta-form">
        <label>Description<br /><textarea id="meta-desc" rows="3" maxlength="2000"></textarea></label>
        <label>Latitude<br /><input type="number" id="meta-lat" step="any" min="-90" max="90" placeholder="e.g. 47.38" /></label>
        <label>Longitude<br /><input type="number" id="meta-lng" step="any" min="-180" max="180" placeholder="e.g. 8.54" /></label>
        <div class="meta-modal-actions">
          <button type="submit" class="primary">Save</button>
          <button type="button" id="meta-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <small>&copy; my.ordinary.click</small>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="/app.js" type="module"></script>
</body>
</html>
