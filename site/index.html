<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ordinary.click — a personal image gallery</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:," />
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1><a href="/">ordinary.click</a></h1>
        <p class="tagline">A personal image gallery of unremarkable, ordinary moments.</p>
      </div>
      <nav id="auth-nav" class="auth-nav"></nav>
    </div>
  </header>

  <main id="app">
    <section id="intro">
      <p>Loading categories…</p>
    </section>
  </main>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" aria-label="Close">×</button>
    <button class="lightbox-prev" aria-label="Previous">‹</button>
    <img alt="" />
    <button class="lightbox-next" aria-label="Next">›</button>
  </div>

  <footer>
    <small>© ordinary.click</small>
  </footer>

  <script src="/app.js" type="module"></script>
</body>
</html>
